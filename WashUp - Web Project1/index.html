<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WashUp Laundry - Login</title>
  
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="image/LogoWahUp.png" alt="WashUp Laundry" id="logoImg">
      </div>
    </div>

    <!-- Form Content -->
    <div class="form-content">
      <h1 class="text-center">Selamat datang!</h1>
      <p class="subtitle text-center">Silahkan Login/Register untuk Melanjutkan!</p>

      <div class="mb-3">
        <label class="form-label fw-semibold">EMAIL</label>
        <div class="input-group">
          <span class="input-group-text">✉️</span>
          <input type="email" class="form-control" id="email" placeholder="Masukkan email">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text">🔑</span>
          <input type="password" class="form-control" id="password" placeholder="Masukkan password">
        </div>
      </div>

      <div class="text-end mb-4">
        <a href="#" class="text-primary text-decoration-none">Lupa Password</a>
      </div>

      <div class="role-title mb-2">MASUK SEBAGAI :</div>
      <div class="role-container row g-3">
        <div class="col-6">
          <div class="role-btn active text-center p-3" id="customerBtn">
            <img src="image/IconCustomer.png" alt="customer" width="32">
            <div class="mt-2 fw-semibold">CUSTOMER</div>
          </div>
        </div>
        <div class="col-6">
          <div class="role-btn text-center p-3" id="ownerBtn">
            <img src="image/IconOwner.png" alt="owner" width="32">
            <div class="mt-2 fw-semibold">OWNER</div>
          </div>
        </div>
      </div>

      <button class="btn btn-success w-100 py-3 fw-bold mt-4" onclick="login()">LOGIN</button>

      <div class="text-center my-4 text-muted">
        Belum Memiliki Akun?
      </div>
      <button class="btn btn-outline-secondary w-100 py-3 fw-semibold" onclick="register()">REGISTRASI</button>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Custom JavaScript -->
  <script src="script.js"></script>
</body>
</html>
